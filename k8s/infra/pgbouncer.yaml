apiVersion: apps/v1
kind: Deployment
metadata:
  name: pgbouncer
  namespace: notification
  labels:
    app: pgbouncer
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pgbouncer
  template:
    metadata:
      labels:
        app: pgbouncer
    spec:
      containers:
        - name: pgbouncer
          image: edoburu/pgbouncer:latest
          ports:
            - containerPort: 5432
          env:
            - name: DATABASE_URL
              value: postgres://notification:notification_secret@postgres:5432/notification_db
            - name: POOL_MODE
              value: transaction
            - name: MAX_CLIENT_CONN
              value: "10000"
            - name: DEFAULT_POOL_SIZE
              value: "50"
            - name: MIN_POOL_SIZE
              value: "10"
            - name: RESERVE_POOL_SIZE
              value: "25"
            - name: RESERVE_POOL_TIMEOUT
              value: "3"
            - name: AUTH_TYPE
              value: scram-sha-256
          readinessProbe:
            tcpSocket:
              port: 5432
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: pgbouncer
  namespace: notification
spec:
  selector:
    app: pgbouncer
  ports:
    - port: 5432
      targetPort: 5432
