apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: notification
  labels:
    app: postgres
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_USER
              value: notification
            - name: POSTGRES_PASSWORD
              value: notification_secret
            - name: POSTGRES_DB
              value: notification_db
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "notification", "-d", "notification_db"]
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "notification", "-d", "notification_db"]
            initialDelaySeconds: 15
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: postgres-data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: notification
spec:
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432
