apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: notification-dbwriter-scaler
  namespace: notification
spec:
  scaleTargetRef:
    name: notification-dbwriter
  pollingInterval: 10
  cooldownPeriod: 30
  minReplicaCount: 1
  maxReplicaCount: 8
  triggers:
    - type: redis-streams
      metadata:
        address: redis.notification.svc.cluster.local:6379
        stream: persist:queue
        consumerGroup: dbwriter-group
        lagCount: "15"
