apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: notification-scheduler-scaler
  namespace: notification
spec:
  scaleTargetRef:
    name: notification-scheduler
  pollingInterval: 15
  cooldownPeriod: 60
  minReplicaCount: 1
  maxReplicaCount: 3
  triggers:
    # Scale based on schedule:pending sorted set size (ZCARD)
    - type: redis
      metadata:
        address: redis.notification.svc.cluster.local:6379
        listName: schedule:pending
        listLength: "100"
        activationListLength: "10"
