apiVersion: v1
kind: ConfigMap
metadata:
  name: notification-dbwriter-config
  namespace: notification
data:
  DB_HOST: "pgbouncer"
  DB_PORT: "5432"
  DB_USER: "notification"
  DB_PASSWORD: "notification_secret"
  DB_NAME: "notification_db"
  DB_SSL_MODE: "disable"
  DB_MAX_OPEN_CONNS: "25"
  DB_MAX_IDLE_CONNS: "10"
  DB_CONN_MAX_LIFETIME: "5m"
  REDIS_ADDR: "redis:6379"
  REDIS_PASSWORD: ""
  REDIS_DB: "0"
  QUEUE_CONSUMER_GROUP: "notification-workers"
  WEBHOOK_URL: "https://webhook.site/placeholder"
  LOG_LEVEL: "info"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-dbwriter
  namespace: notification
  labels:
    app: notification-dbwriter
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notification-dbwriter
  template:
    metadata:
      labels:
        app: notification-dbwriter
    spec:
      containers:
        - name: notification-dbwriter
          image: notification-dbwriter:local
          imagePullPolicy: Never
          envFrom:
            - configMapRef:
                name: notification-dbwriter-config
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
