apiVersion: v1
kind: ConfigMap
metadata:
  name: notification-api-config
  namespace: notification
data:
  SERVER_PORT: "8080"
  SERVER_READ_TIMEOUT: "15s"
  SERVER_WRITE_TIMEOUT: "15s"
  SERVER_SHUTDOWN_TIMEOUT: "30s"
  REDIS_ADDR: "redis:6379"
  REDIS_PASSWORD: ""
  REDIS_DB: "0"
  DB_HOST: "pgbouncer"
  DB_PORT: "5432"
  DB_USER: "notification"
  DB_PASSWORD: "notification_secret"
  DB_NAME: "notification_db"
  DB_SSL_MODE: "disable"
  DB_MAX_OPEN_CONNS: "5"
  DB_MAX_IDLE_CONNS: "2"
  DB_CONN_MAX_LIFETIME: "5m"
  QUEUE_CONSUMER_GROUP: "notification-workers"
  QUEUE_WEIGHT_HIGH: "10"
  QUEUE_WEIGHT_NORMAL: "5"
  QUEUE_WEIGHT_LOW: "2"
  RATE_LIMIT_PER_SECOND: "100"
  RETRY_MAX_ATTEMPTS: "5"
  WEBHOOK_URL: "https://webhook.site/test"
  LOG_LEVEL: "info"
  API_KEY: "demo-api-key-2024"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-api
  namespace: notification
  labels:
    app: notification-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notification-api
  template:
    metadata:
      labels:
        app: notification-api
    spec:
      containers:
        - name: notification-api
          image: notification-api:local
          imagePullPolicy: Never
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: notification-api-config
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: notification-api
  namespace: notification
spec:
  type: NodePort
  selector:
    app: notification-api
  ports:
    - port: 8080
      targetPort: 8080
      nodePort: 30080
