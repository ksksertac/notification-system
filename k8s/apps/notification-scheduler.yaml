apiVersion: v1
kind: ConfigMap
metadata:
  name: notification-scheduler-config
  namespace: notification
data:
  REDIS_ADDR: "redis:6379"
  REDIS_PASSWORD: ""
  REDIS_DB: "0"
  QUEUE_CONSUMER_GROUP: "notification-workers"
  SCHEDULER_POLL_INTERVAL: "5s"
  SCHEDULER_BATCH_SIZE: "500"
  LOG_LEVEL: "info"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-scheduler
  namespace: notification
  labels:
    app: notification-scheduler
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notification-scheduler
  template:
    metadata:
      labels:
        app: notification-scheduler
    spec:
      containers:
        - name: notification-scheduler
          image: notification-scheduler:local
          imagePullPolicy: Never
          envFrom:
            - configMapRef:
                name: notification-scheduler-config
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 300m
              memory: 256Mi
