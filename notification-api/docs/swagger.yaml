basePath: /api/v1
definitions:
  github_com_sertacyildirim_notification-system_shared_domain.APIError:
    properties:
      code:
        type: string
      message:
        type: string
    type: object
  github_com_sertacyildirim_notification-system_shared_domain.APIResponse:
    properties:
      correlation_id:
        type: string
      data: {}
      error:
        $ref: '#/definitions/github_com_sertacyildirim_notification-system_shared_domain.APIError'
      success:
        type: boolean
    type: object
  github_com_sertacyildirim_notification-system_shared_domain.BatchCreateRequest:
    properties:
      notifications:
        items:
          $ref: '#/definitions/github_com_sertacyildirim_notification-system_shared_domain.CreateNotificationRequest'
        type: array
    type: object
  github_com_sertacyildirim_notification-system_shared_domain.BatchCreateResponse:
    properties:
      batch_id:
        type: string
      notifications:
        items:
          $ref: '#/definitions/github_com_sertacyildirim_notification-system_shared_domain.NotificationResponse'
        type: array
      total:
        type: integer
    type: object
  github_com_sertacyildirim_notification-system_shared_domain.CreateNotificationRequest:
    properties:
      channel:
        type: string
      content:
        type: string
      metadata:
        additionalProperties: {}
        type: object
      priority:
        type: string
      recipient:
        type: string
      scheduled_at:
        type: string
    type: object
  github_com_sertacyildirim_notification-system_shared_domain.ListNotificationsResponse:
    properties:
      next_cursor:
        type: string
      notifications:
        items:
          $ref: '#/definitions/github_com_sertacyildirim_notification-system_shared_domain.NotificationResponse'
        type: array
      total:
        type: integer
    type: object
  github_com_sertacyildirim_notification-system_shared_domain.NotificationResponse:
    properties:
      batch_id:
        type: string
      channel:
        type: string
      content:
        type: string
      created_at:
        type: string
      error_message:
        type: string
      id:
        type: string
      idempotency_key:
        type: string
      priority:
        type: string
      provider_msg_id:
        type: string
      recipient:
        type: string
      retry_count:
        type: integer
      scheduled_at:
        type: string
      status:
        type: string
      updated_at:
        type: string
    type: object
  handler.healthStatus:
    properties:
      components:
        additionalProperties:
          type: string
        type: object
      status:
        type: string
    type: object
host: localhost:8080
info:
  contact: {}
  description: Event-driven notification system supporting SMS, Email, and Push channels
    with priority queuing, retry logic, and real-time status tracking.
  title: Notification System API
  version: "1.0"
paths:
  /health:
    get:
      description: Check health status of all system components (Postgres, Redis)
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handler.healthStatus'
        "503":
          description: Service Unavailable
          schema:
            $ref: '#/definitions/handler.healthStatus'
      summary: Health check
      tags:
      - system
  /notifications:
    get:
      description: List notifications with cursor-based pagination and optional filters
      parameters:
      - description: Filter by status (pending, queued, processing, delivered, failed,
          cancelled)
        in: query
        name: status
        type: string
      - description: Filter by channel (sms, email, push)
        in: query
        name: channel
        type: string
      - description: Filter by start date (RFC3339)
        in: query
        name: start_date
        type: string
      - description: Filter by end date (RFC3339)
        in: query
        name: end_date
        type: string
      - description: Cursor for pagination (notification UUID)
        in: query
        name: cursor
        type: string
      - description: Page size (1-100, default 20)
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/github_com_sertacyildirim_notification-system_shared_domain.APIResponse'
            - properties:
                data:
                  $ref: '#/definitions/github_com_sertacyildirim_notification-system_shared_domain.ListNotificationsResponse'
              type: object
        "400":
          description: Bad Request
          schema:
            allOf:
            - $ref: '#/definitions/github_com_sertacyildirim_notification-system_shared_domain.APIResponse'
            - properties:
                error:
                  $ref: '#/definitions/github_com_sertacyildirim_notification-system_shared_domain.APIError'
              type: object
        "500":
          description: Internal Server Error
          schema:
            allOf:
            - $ref: '#/definitions/github_com_sertacyildirim_notification-system_shared_domain.APIResponse'
            - properties:
                error:
                  $ref: '#/definitions/github_com_sertacyildirim_notification-system_shared_domain.APIError'
              type: object
      summary: List notifications
      tags:
      - notifications
    post:
      consumes:
      - application/json
      description: Create a new notification for delivery via SMS, Email, or Push
      parameters:
      - description: Idempotency key for deduplication
        in: header
        name: Idempotency-Key
        type: string
      - description: Notification request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/github_com_sertacyildirim_notification-system_shared_domain.CreateNotificationRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            allOf:
            - $ref: '#/definitions/github_com_sertacyildirim_notification-system_shared_domain.APIResponse'
            - properties:
                data:
                  $ref: '#/definitions/github_com_sertacyildirim_notification-system_shared_domain.NotificationResponse'
              type: object
        "400":
          description: Bad Request
          schema:
            allOf:
            - $ref: '#/definitions/github_com_sertacyildirim_notification-system_shared_domain.APIResponse'
            - properties:
                error:
                  $ref: '#/definitions/github_com_sertacyildirim_notification-system_shared_domain.APIError'
              type: object
        "500":
          description: Internal Server Error
          schema:
            allOf:
            - $ref: '#/definitions/github_com_sertacyildirim_notification-system_shared_domain.APIResponse'
            - properties:
                error:
                  $ref: '#/definitions/github_com_sertacyildirim_notification-system_shared_domain.APIError'
              type: object
      summary: Create a notification
      tags:
      - notifications
  /notifications/{id}:
    get:
      description: Retrieve a single notification by its UUID
      parameters:
      - description: Notification UUID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/github_com_sertacyildirim_notification-system_shared_domain.APIResponse'
            - properties:
                data:
                  $ref: '#/definitions/github_com_sertacyildirim_notification-system_shared_domain.NotificationResponse'
              type: object
        "400":
          description: Bad Request
          schema:
            allOf:
            - $ref: '#/definitions/github_com_sertacyildirim_notification-system_shared_domain.APIResponse'
            - properties:
                error:
                  $ref: '#/definitions/github_com_sertacyildirim_notification-system_shared_domain.APIError'
              type: object
        "404":
          description: Not Found
          schema:
            allOf:
            - $ref: '#/definitions/github_com_sertacyildirim_notification-system_shared_domain.APIResponse'
            - properties:
                error:
                  $ref: '#/definitions/github_com_sertacyildirim_notification-system_shared_domain.APIError'
              type: object
        "500":
          description: Internal Server Error
          schema:
            allOf:
            - $ref: '#/definitions/github_com_sertacyildirim_notification-system_shared_domain.APIResponse'
            - properties:
                error:
                  $ref: '#/definitions/github_com_sertacyildirim_notification-system_shared_domain.APIError'
              type: object
      summary: Get notification by ID
      tags:
      - notifications
  /notifications/{id}/cancel:
    patch:
      description: Cancel a pending or queued notification before delivery
      parameters:
      - description: Notification UUID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_sertacyildirim_notification-system_shared_domain.APIResponse'
        "400":
          description: Bad Request
          schema:
            allOf:
            - $ref: '#/definitions/github_com_sertacyildirim_notification-system_shared_domain.APIResponse'
            - properties:
                error:
                  $ref: '#/definitions/github_com_sertacyildirim_notification-system_shared_domain.APIError'
              type: object
        "404":
          description: Not Found
          schema:
            allOf:
            - $ref: '#/definitions/github_com_sertacyildirim_notification-system_shared_domain.APIResponse'
            - properties:
                error:
                  $ref: '#/definitions/github_com_sertacyildirim_notification-system_shared_domain.APIError'
              type: object
        "409":
          description: Conflict
          schema:
            allOf:
            - $ref: '#/definitions/github_com_sertacyildirim_notification-system_shared_domain.APIResponse'
            - properties:
                error:
                  $ref: '#/definitions/github_com_sertacyildirim_notification-system_shared_domain.APIError'
              type: object
        "500":
          description: Internal Server Error
          schema:
            allOf:
            - $ref: '#/definitions/github_com_sertacyildirim_notification-system_shared_domain.APIResponse'
            - properties:
                error:
                  $ref: '#/definitions/github_com_sertacyildirim_notification-system_shared_domain.APIError'
              type: object
      summary: Cancel a notification
      tags:
      - notifications
  /notifications/batch:
    post:
      consumes:
      - application/json
      description: Create up to 1000 notifications in a single request
      parameters:
      - description: Batch notification request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/github_com_sertacyildirim_notification-system_shared_domain.BatchCreateRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            allOf:
            - $ref: '#/definitions/github_com_sertacyildirim_notification-system_shared_domain.APIResponse'
            - properties:
                data:
                  $ref: '#/definitions/github_com_sertacyildirim_notification-system_shared_domain.BatchCreateResponse'
              type: object
        "400":
          description: Bad Request
          schema:
            allOf:
            - $ref: '#/definitions/github_com_sertacyildirim_notification-system_shared_domain.APIResponse'
            - properties:
                error:
                  $ref: '#/definitions/github_com_sertacyildirim_notification-system_shared_domain.APIError'
              type: object
        "500":
          description: Internal Server Error
          schema:
            allOf:
            - $ref: '#/definitions/github_com_sertacyildirim_notification-system_shared_domain.APIResponse'
            - properties:
                error:
                  $ref: '#/definitions/github_com_sertacyildirim_notification-system_shared_domain.APIError'
              type: object
      summary: Create a batch of notifications
      tags:
      - notifications
  /notifications/batch/{batchId}:
    get:
      description: Retrieve all notifications belonging to a batch
      parameters:
      - description: Batch UUID
        in: path
        name: batchId
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/github_com_sertacyildirim_notification-system_shared_domain.APIResponse'
            - properties:
                data:
                  items:
                    $ref: '#/definitions/github_com_sertacyildirim_notification-system_shared_domain.NotificationResponse'
                  type: array
              type: object
        "400":
          description: Bad Request
          schema:
            allOf:
            - $ref: '#/definitions/github_com_sertacyildirim_notification-system_shared_domain.APIResponse'
            - properties:
                error:
                  $ref: '#/definitions/github_com_sertacyildirim_notification-system_shared_domain.APIError'
              type: object
        "500":
          description: Internal Server Error
          schema:
            allOf:
            - $ref: '#/definitions/github_com_sertacyildirim_notification-system_shared_domain.APIResponse'
            - properties:
                error:
                  $ref: '#/definitions/github_com_sertacyildirim_notification-system_shared_domain.APIError'
              type: object
      summary: Get notifications by batch ID
      tags:
      - notifications
swagger: "2.0"
