name: notification-api

on:
  push:
    branches: [main]
    paths:
      - "notification-api/**"
      - "shared/**"
  pull_request:
    branches: [main]
    paths:
      - "notification-api/**"
      - "shared/**"

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache-dependency-path: notification-api/go.sum
      - name: Vet
        working-directory: notification-api
        run: go vet ./...

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache-dependency-path: notification-api/go.sum
      - name: Test
        working-directory: notification-api
        run: go test -race -count=1 -coverprofile=coverage.out ./...

  build:
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t notification-api:${{ github.sha }} -f notification-api/Dockerfile .
