name: SonarCloud Analysis

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  sonarcloud:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache-dependency-path: |
            shared/go.sum
            notification-api/go.sum
            notification-consumer/go.sum
            notification-scheduler/go.sum
            notification-dbwriter/go.sum

      - name: Run tests with coverage (shared)
        run: |
          cd shared
          go test ./... -coverprofile=coverage.out -covermode=atomic -json > test-report.json 2>&1 || true

      - name: Run tests with coverage (api)
        run: |
          cd notification-api
          go test ./... -coverprofile=coverage.out -covermode=atomic -json > test-report.json 2>&1 || true

      - name: Run tests with coverage (consumer)
        run: |
          cd notification-consumer
          go test ./... -coverprofile=coverage.out -covermode=atomic -json > test-report.json 2>&1 || true

      - name: Run tests with coverage (scheduler)
        run: |
          cd notification-scheduler
          go test ./... -coverprofile=coverage.out -covermode=atomic -json > test-report.json 2>&1 || true

      - name: Run tests with coverage (dbwriter)
        run: |
          cd notification-dbwriter
          go test ./... -coverprofile=coverage.out -covermode=atomic -json > test-report.json 2>&1 || true

      - name: Merge coverage reports
        run: |
          echo "mode: atomic" > coverage.out
          for f in shared/coverage.out notification-api/coverage.out notification-consumer/coverage.out notification-scheduler/coverage.out notification-dbwriter/coverage.out; do
            if [ -f "$f" ]; then
              tail -n +2 "$f" >> coverage.out
            fi
          done

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
